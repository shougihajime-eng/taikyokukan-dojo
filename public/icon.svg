<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="sky" x1="0.2" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#0b1130"/>
      <stop offset="0.55" stop-color="#0a0f20"/>
      <stop offset="1" stop-color="#141d3a"/>
    </linearGradient>
    <radialGradient id="nebula" cx="0.2" cy="0.12" r="0.9">
      <stop offset="0" stop-color="#5a4aa8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#5a4aa8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dawn" cx="0.5" cy="1.05" r="0.85">
      <stop offset="0" stop-color="#f7c478" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#f7c478" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="koma" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdf3da"/>
      <stop offset="0.82" stop-color="#eed3a0"/>
      <stop offset="1" stop-color="#e7c987"/>
    </linearGradient>
    <radialGradient id="komaGlow" cx="0.5" cy="0.45" r="0.62">
      <stop offset="0" stop-color="#f7e6b8" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#f7e6b8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 夜空の地 -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#sky)"/>
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#nebula)"/>
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#dawn)"/>

  <!-- 星 -->
  <g fill="#fff">
    <circle cx="96" cy="120" r="3" opacity="0.9"/>
    <circle cx="420" cy="96" r="2.4" opacity="0.75"/>
    <circle cx="150" cy="220" r="2" opacity="0.6"/>
    <circle cx="372" cy="200" r="2.6" opacity="0.8"/>
    <circle cx="74" cy="330" r="2" opacity="0.5"/>
    <circle cx="446" cy="300" r="2.2" opacity="0.65"/>
  </g>
  <g fill="#e7c987">
    <circle cx="120" cy="70" r="2.6" opacity="0.9"/>
    <circle cx="402" cy="150" r="2" opacity="0.8"/>
  </g>

  <!-- 駒のうしろの光 -->
  <ellipse cx="256" cy="262" rx="150" ry="160" fill="url(#komaGlow)"/>

  <!-- 五角形の駒 -->
  <path d="M256 92 L356 138 L398 432 L114 432 L156 138 Z"
        fill="url(#koma)" stroke="#b48b48" stroke-width="6" stroke-linejoin="round"/>

  <!-- 「局」の文字 -->
  <text x="256" y="318" text-anchor="middle"
        font-family="'Yu Mincho','Hiragino Mincho ProN','Noto Serif JP',serif"
        font-weight="700" font-size="206" fill="#241808">局</text>
</svg>
